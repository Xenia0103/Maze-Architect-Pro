<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Architect Pro</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #cbd5e1; }
        .no-select { user-select: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        /* Context Menu Styling */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #94a3b8;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 6px;
            z-index: 9999;
            min-width: 180px;
        }
        .context-menu-item {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            color: #1e293b;
        }
        .context-menu-item:hover { background: #f1f5f9; color: #4f46e5; }
        .context-menu-divider { height: 1px; background: #e2e8f0; margin: 4px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Constants ---
        const CELL_SIZE = 32;
        const WALL_THICKNESS = 6;
        const COLORS = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1'];
        const MOVE_RULES = { FREE: '自由移動', ICE: '氷マス', LEFT_ONLY: '左折のみ', RIGHT_ONLY: '右折のみ' };
        const PATH_MODES = { SHORTEST: '最短経路', LONGEST: '最長経路', ALL_CELLS: '全マス通過' };

        // --- Lucide Icon Helper ---
        const Icon = ({ name, size = 16, className = "", fill = "none" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && lucide.icons[name]) {
                    lucide.createIcons({
                        targets: [iconRef.current],
                        icons: { [name]: lucide.icons[name] },
                        attrs: { 
                            stroke: "currentColor", 
                            "stroke-width": 2, 
                            fill: fill,
                            width: size, 
                            height: size 
                        }
                    });
                }
            }, [name, size, fill]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // --- Solver Engine ---
        class MazeSolver {
            constructor(grid, hWalls, vWalls, pairs, warps, options) {
                this.grid = grid; this.hWalls = hWalls; this.vWalls = vWalls;
                this.pairs = pairs; this.warps = warps; this.options = options;
                this.height = grid.length; this.width = grid[0].length;
            }
            isWall(r, c) {
                if (r < 0 || r >= this.height || c < 0 || c >= this.width) return true;
                return this.grid[r][c].isWall;
            }
            hasBorder(r1, c1, r2, c2) {
                if (r1 === r2) { const minC = Math.min(c1, c2); return this.vWalls[r1][minC + 1]; }
                else { const minR = Math.min(r1, r2); return this.hWalls[minR + 1][c1]; }
            }
            getWarp(r, c) {
                for (const warp of this.warps) {
                    if (warp.a.r === r && warp.a.c === c) return warp.b;
                    if (warp.b.r === r && warp.b.c === c) return warp.a;
                }
                return null;
            }
            solve() {
                const results = {};
                for (const pair of this.pairs) { if (!pair.start || !pair.goal) continue; results[pair.id] = this.solvePair(pair); }
                return results;
            }
            solvePair(pair) {
                const { start, goal, requiredCells, mode, moveRule } = pair;
                const limit = this.options.maxSolutions || 5;
                if (mode === PATH_MODES.SHORTEST) {
                    const path = this.findShortestPathSequence(start, goal, requiredCells, moveRule);
                    return path ? [path] : [];
                } else {
                    let solutions = [];
                    this.dfs(start, goal, requiredCells, moveRule, mode, [], new Set(), solutions, limit);
                    return solutions;
                }
            }
            findShortestPathSequence(start, goal, cps, moveRule) {
                let currentPos = { ...start, dir: null };
                let fullPath = [currentPos];
                const points = [...cps, goal];
                for (const target of points) {
                    const segment = this.bfs(currentPos, target, moveRule);
                    if (!segment) return null;
                    fullPath.push(...segment.slice(1));
                    currentPos = fullPath[fullPath.length - 1];
                }
                return fullPath;
            }
            bfs(start, target, moveRule) {
                const queue = [[{ ...start, dir: null }]];
                const visited = new Set();
                visited.add(`${start.r},${start.c},null`);
                while (queue.length > 0) {
                    const path = queue.shift();
                    const curr = path[path.length - 1];
                    if (curr.r === target.r && curr.c === target.c) return path;
                    const neighbors = this.getNeighbors(curr, moveRule);
                    for (const next of neighbors) {
                        const key = `${next.r},${next.c},${next.dir}`;
                        if (!visited.has(key)) { visited.add(key); queue.push([...path, next]); }
                    }
                }
                return null;
            }
            dfs(curr, goal, cps, moveRule, mode, path, visited, solutions, limit) {
                if (solutions.length >= limit) return;
                const newPath = [...path, curr];
                const posKey = `${curr.r},${curr.c}`;
                if (curr.r === goal.r && curr.c === goal.c) {
                    const allCpsVisited = cps.every(cp => newPath.some(p => p.r === cp.r && p.c === cp.c));
                    const allCellsVisited = mode === PATH_MODES.ALL_CELLS ? this.checkAllCells(newPath) : true;
                    if (allCpsVisited && allCellsVisited) solutions.push(newPath);
                    return;
                }
                visited.add(posKey);
                const neighbors = this.getNeighbors(curr, moveRule);
                for (const next of neighbors) {
                    if (!visited.has(`${next.r},${next.c}`)) {
                        this.dfs(next, goal, cps, moveRule, mode, newPath, visited, solutions, limit);
                    }
                }
                visited.delete(posKey);
            }
            checkAllCells(path) {
                const pathSet = new Set(path.map(p => `${p.r},${p.c}`));
                for (let r = 0; r < this.height; r++) {
                    for (let c = 0; c < this.width; c++) {
                        if (!this.grid[r][c].isWall && !pathSet.has(`${r},${c}`)) return false;
                    }
                }
                return true;
            }
            getNeighbors(curr, moveRule) {
                const dirs = [{ dr: -1, dc: 0, name: 'up' }, { dr: 1, dc: 0, name: 'down' }, { dr: 0, dc: -1, name: 'left' }, { dr: 0, dc: 1, name: 'right' }];
                let possibleDirs = dirs;
                if (moveRule === MOVE_RULES.LEFT_ONLY && curr.dir) {
                    const leftMap = { up: 'left', down: 'right', left: 'down', right: 'up' };
                    possibleDirs = dirs.filter(d => d.name === curr.dir || d.name === leftMap[curr.dir]);
                } else if (moveRule === MOVE_RULES.RIGHT_ONLY && curr.dir) {
                    const rightMap = { up: 'right', down: 'left', left: 'up', right: 'down' };
                    possibleDirs = dirs.filter(d => d.name === curr.dir || d.name === rightMap[curr.dir]);
                }
                const neighbors = [];
                for (const d of possibleDirs) {
                    let nr = curr.r + d.dr;
                    let nc = curr.c + d.dc;
                    if (this.isWall(nr, nc) || this.hasBorder(curr.r, curr.c, nr, nc)) continue;
                    if (moveRule === MOVE_RULES.ICE) {
                        let lastR = nr, lastC = nc;
                        while (true) {
                            let nextR = lastR + d.dr, nextC = lastC + d.dc;
                            if (this.isWall(nextR, nextC) || this.hasBorder(lastR, lastC, nextR, nextC)) break;
                            lastR = nextR; lastC = nextC;
                        }
                        nr = lastR; nc = lastC;
                    }
                    const warpDest = this.getWarp(nr, nc);
                    if (warpDest) neighbors.push({ r: warpDest.r, c: warpDest.c, dir: d.name });
                    else neighbors.push({ r: nr, c: nc, dir: d.name });
                }
                return neighbors;
            }
        }

        // --- Main App Component ---
        function App() {
            const [grid, setGrid] = useState([]);
            const [hWalls, setHWalls] = useState([]);
            const [vWalls, setVWalls] = useState([]);
            const [pairs, setPairs] = useState([{ id: Date.now(), start: null, goal: null, requiredCells: [], color: COLORS[0], mode: PATH_MODES.SHORTEST, moveRule: MOVE_RULES.FREE }]);
            const [activePairIdx, setActivePairIdx] = useState(0);
            const [warps, setWarps] = useState([]);
            const [solverOptions, setSolverOptions] = useState({ maxSolutions: 5 });
            const [solutions, setSolutions] = useState({});
            const [statusMsg, setStatusMsg] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [dim, setDim] = useState({ w: 5, h: 5 });
            const [targetDim, setTargetDim] = useState({ w: 5, h: 5 });
            const [history, setHistory] = useState([]);
            const [historyIdx, setHistoryIdx] = useState(-1);
            const [viewTransform, setViewTransform] = useState({ x: 100, y: 100, scale: 1.5 });
            const [isPanning, setIsPanning] = useState(false);
            const [panStart, setPanStart] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragType, setDragType] = useState(null); // 'cell' | 'border'
            const [dragMode, setDragMode] = useState(null); // 'add' | 'remove'
            const [pendingWarp, setPendingWarp] = useState(null);
            const [contextMenu, setContextMenu] = useState(null); // { x, y, r, c }

            const gridRef = useRef(null);
            const workspaceRef = useRef(null);

            // --- History System ---
            const saveHistory = useCallback((currentData) => {
                const state = currentData || { grid, hWalls, vWalls, pairs, warps, dim };
                const snapshot = JSON.stringify(state);
                const newHistory = history.slice(0, historyIdx + 1);
                newHistory.push(snapshot);
                if (newHistory.length > 50) newHistory.shift();
                setHistory(newHistory);
                setHistoryIdx(newHistory.length - 1);
            }, [grid, hWalls, vWalls, pairs, warps, dim, history, historyIdx]);

            useEffect(() => { resetMaze(5, 5, true); }, []);

            const undo = () => {
                if (historyIdx > 0) {
                    const prevState = JSON.parse(history[historyIdx - 1]);
                    setGrid(prevState.grid); setHWalls(prevState.hWalls); setVWalls(prevState.vWalls);
                    setPairs(prevState.pairs); setWarps(prevState.warps); setDim(prevState.dim); setTargetDim(prevState.dim);
                    setHistoryIdx(historyIdx - 1); setSolutions({});
                }
            };

            const redo = () => {
                if (historyIdx < history.length - 1) {
                    const nextState = JSON.parse(history[historyIdx + 1]);
                    setGrid(nextState.grid); setHWalls(nextState.hWalls); setVWalls(nextState.vWalls);
                    setPairs(nextState.pairs); setWarps(nextState.warps); setDim(nextState.dim); setTargetDim(nextState.dim);
                    setHistoryIdx(historyIdx + 1); setSolutions({});
                }
            };

            const resetMaze = (w, h, skipHistory = false) => {
                const newGrid = Array(h).fill(0).map(() => Array(w).fill(0).map(() => ({ isWall: false })));
                const newHWalls = Array(h + 1).fill(0).map(() => Array(w).fill(false));
                const newVWalls = Array(h).fill(0).map(() => Array(w + 1).fill(false));
                const newPairs = [{ id: Date.now(), start: null, goal: null, requiredCells: [], color: COLORS[0], mode: PATH_MODES.SHORTEST, moveRule: MOVE_RULES.FREE }];
                setGrid(newGrid); setHWalls(newHWalls); setVWalls(newVWalls); setPairs(newPairs); setWarps([]);
                setSolutions({}); setDim({ w, h }); setTargetDim({ w, h }); setViewTransform({ x: 100, y: 100, scale: 1.5 });
                if (!skipHistory) saveHistory({ grid: newGrid, hWalls: newHWalls, vWalls: newVWalls, pairs: newPairs, warps: [], dim: { w, h } });
                else { setHistory([JSON.stringify({ grid: newGrid, hWalls: newHWalls, vWalls: newVWalls, pairs: newPairs, warps: [], dim: { w, h } })]); setHistoryIdx(0); }
            };

            const applyResize = () => {
                const { w: newW, h: newH } = targetDim; const oldW = dim.w, oldH = dim.h;
                const newGrid = Array(newH).fill(0).map((_, r) => Array(newW).fill(0).map((_, c) => (r < oldH && c < oldW) ? { ...grid[r][c] } : { isWall: false }));
                const newHWalls = Array(newH + 1).fill(0).map((_, r) => Array(newW).fill(0).map((_, c) => (r <= oldH && c < oldW) ? hWalls[r][c] : false));
                const newVWalls = Array(newH).fill(0).map((_, r) => Array(newW + 1).fill(0).map((_, c) => (r < oldH && c <= oldW) ? vWalls[r][c] : false));
                const filterOOB = (p) => p && p.r < newH && p.c < newW;
                const newPairs = pairs.map(p => ({ ...p, start: filterOOB(p.start) ? p.start : null, goal: filterOOB(p.goal) ? p.goal : null, requiredCells: p.requiredCells.filter(filterOOB) }));
                const newWarps = warps.filter(w => filterOOB(w.a) && filterOOB(w.b));
                setGrid(newGrid); setHWalls(newHWalls); setVWalls(newVWalls); setPairs(newPairs); setWarps(newWarps); setDim({ w: newW, h: newH });
                setSolutions({}); saveHistory({ grid: newGrid, hWalls: newHWalls, vWalls: newVWalls, pairs: newPairs, warps: newWarps, dim: { w: newW, h: newH } });
            };

            const isOccupied = (r, c) => {
                return pairs.some(p => (p.start?.r === r && p.start?.c === c) || (p.goal?.r === r && p.goal?.c === c) || p.requiredCells.some(cp => cp.r === r && cp.c === c)) ||
                       warps.some(w => (w.a.r === r && w.a.c === c) || (w.b.r === r && w.b.c === c));
            };

            const clearCellAttributes = (r, c, updatedPairs, updatedWarps) => {
                updatedPairs.forEach(p => {
                    if (p.start?.r === r && p.start?.c === c) p.start = null;
                    if (p.goal?.r === r && p.goal?.c === c) p.goal = null;
                    p.requiredCells = p.requiredCells.filter(cp => cp.r !== r || cp.c !== c);
                });
                const warpIdx = updatedWarps.findIndex(w => (w.a.r === r && w.a.c === c) || (w.b.r === r && w.b.c === c));
                if (warpIdx !== -1) updatedWarps.splice(warpIdx, 1);
            };

            // --- Handlers ---
            const handleCellWall = (r, c, initial = false) => {
                if (r < 0 || r >= dim.h || c < 0 || c >= dim.w || isOccupied(r, c)) return;
                const newGrid = [...grid.map(row => [...row])];
                if (initial) {
                    const mode = grid[r][c].isWall ? 'remove' : 'add';
                    setDragMode(mode);
                    newGrid[r][c].isWall = mode === 'add';
                } else if (dragMode) {
                    newGrid[r][c].isWall = dragMode === 'add';
                }
                setGrid(newGrid);
            };

            const handleBorderWall = (type, r, c, initial = false) => {
                const updatedHWalls = [...hWalls.map(row=>[...row])];
                const updatedVWalls = [...vWalls.map(row=>[...row])];
                
                if (initial) {
                    const currentWalls = type === 'h' ? hWalls : vWalls;
                    const mode = currentWalls[r][c] ? 'remove' : 'add';
                    setDragMode(mode);
                    if (type === 'h') updatedHWalls[r][c] = mode === 'add';
                    else updatedVWalls[r][c] = mode === 'add';
                } else if (dragMode) {
                    if (type === 'h') updatedHWalls[r][c] = dragMode === 'add';
                    else updatedVWalls[r][c] = dragMode === 'add';
                }
                
                setHWalls(updatedHWalls);
                setVWalls(updatedVWalls);
            };

            const setAttribute = (type, r, c) => {
                const nextGrid = [...grid.map(row => [...row])];
                const nextPairs = [...pairs.map(p => ({ ...p, requiredCells: [...p.requiredCells] }))];
                const nextWarps = [...warps];
                const activePair = nextPairs[activePairIdx];

                // Remove existing wall and any attribute at this position
                nextGrid[r][c].isWall = false;
                clearCellAttributes(r, c, nextPairs, nextWarps);

                if (type === 'start') {
                    activePair.start = { r, c };
                } else if (type === 'goal') {
                    activePair.goal = { r, c };
                } else if (type === 'cp') {
                    activePair.requiredCells.push({ r, c });
                } else if (type === 'warp') {
                    if (!pendingWarp) { 
                        setPendingWarp({ r, c }); 
                        setStatusMsg("ワープの出口を選択してください (右クリックメニューから)"); 
                    } else {
                        if (pendingWarp.r === r && pendingWarp.c === c) {
                            setPendingWarp(null);
                        } else {
                            clearCellAttributes(pendingWarp.r, pendingWarp.c, nextPairs, nextWarps);
                            nextGrid[pendingWarp.r][pendingWarp.c].isWall = false;
                            nextWarps.push({ a: pendingWarp, b: { r, c }, id: Date.now() });
                            setPendingWarp(null);
                            setStatusMsg("ワープの接続完了。");
                        }
                    }
                }

                setGrid(nextGrid);
                setPairs(nextPairs);
                setWarps(nextWarps);
                setContextMenu(null);
                
                // Manually trigger history save with the latest computed data
                saveHistory({ grid: nextGrid, hWalls, vWalls, pairs: nextPairs, warps: nextWarps, dim });
            };

            const removeAllAttributes = (r, c) => {
                const nextPairs = [...pairs.map(p => ({ ...p, requiredCells: [...p.requiredCells] }))];
                const nextWarps = [...warps];
                clearCellAttributes(r, c, nextPairs, nextWarps);
                setPairs(nextPairs);
                setWarps(nextWarps);
                setContextMenu(null);
                saveHistory({ grid, hWalls, vWalls, pairs: nextPairs, warps: nextWarps, dim });
            };

            // --- Window Events ---
            const handleWheel = (e) => {
                e.preventDefault();
                const scaleDelta = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.min(Math.max(viewTransform.scale * scaleDelta, 0.2), 4);
                setViewTransform(prev => ({ ...prev, scale: newScale }));
            };

            const handleMouseDown = (e) => {
                setContextMenu(null);
                if (e.button === 1) { // Middle click pan
                    setIsPanning(true);
                    setPanStart({ x: e.clientX - viewTransform.x, y: e.clientY - viewTransform.y });
                }
            };

            const handleMouseMove = (e) => {
                if (isPanning) {
                    setViewTransform(prev => ({ ...prev, x: e.clientX - panStart.x, y: e.clientY - panStart.y }));
                }
            };

            const handleMouseUp = () => {
                if (isDragging) saveHistory();
                setIsPanning(false); setIsDragging(false); setDragMode(null); setDragType(null);
            };

            const onCellContextMenu = (e, r, c) => {
                e.preventDefault();
                setContextMenu({ x: e.clientX, y: e.clientY, r, c });
            };

            // --- Rendering ---
            const getCellContent = (r, c) => {
                const els = [];
                pairs.forEach((p, idx) => {
                    if (p.start?.r === r && p.start?.c === c) els.push(<div key={`s-${idx}`} className="w-6 h-6 rounded-full border-2 border-white shadow flex items-center justify-center text-[9px] font-black text-white z-20" style={{backgroundColor: p.color}}>S{idx+1}</div>);
                    if (p.goal?.r === r && p.goal?.c === c) els.push(<div key={`g-${idx}`} className="w-6 h-6 rounded-full border-2 border-white shadow flex items-center justify-center text-[9px] font-black text-white z-20" style={{backgroundColor: p.color}}>G{idx+1}</div>);
                    if (p.requiredCells.some(cp => cp.r === r && cp.c === c)) els.push(<div key={`cp-${idx}`} className="w-4 h-4 rotate-45 border border-white shadow z-20" style={{backgroundColor: p.color}} />);
                });
                const warpIdx = warps.findIndex(w => (w.a.r === r && w.a.c === c) || (w.b.r === r && w.b.c === c));
                if (warpIdx !== -1) els.push(<div key={`w-${warpIdx}`} className="w-6 h-6 rounded bg-cyan-500 border-2 border-white text-[9px] text-white font-black flex items-center justify-center z-20">W{warpIdx+1}</div>);
                if (pendingWarp?.r === r && pendingWarp?.c === c) els.push(<div key="pw" className="w-6 h-6 rounded bg-cyan-700 animate-pulse z-20" />);
                return els;
            };

            const renderPath = (pairId) => {
                const solList = solutions[pairId]; if (!solList || solList.length === 0) return null;
                const path = solList[0]; const pair = pairs.find(p => p.id === pairId);
                return (<svg className="absolute inset-0 pointer-events-none w-full h-full overflow-visible" style={{zIndex: 30}}><polyline points={path.map(p => `${p.c * CELL_SIZE + CELL_SIZE/2},${p.r * CELL_SIZE + CELL_SIZE/2}`).join(' ')} fill="none" stroke={pair.color} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" opacity="0.8"/></svg>);
            };

            return (
                <div className="flex flex-col h-screen no-select overflow-hidden font-sans" onContextMenu={e => e.preventDefault()}>
                    {/* Header */}
                    <header className="bg-white border-b px-4 py-2 flex items-center justify-between shadow-sm z-50">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-100 rounded-md text-slate-500 transition-colors">
                                <Icon name={isSidebarOpen ? "ChevronLeft" : "ChevronRight"} size={20} />
                            </button>
                            <div className="flex items-center gap-2 pr-4 border-r">
                                <div className="bg-indigo-600 p-1.5 rounded-lg text-white shadow-sm"><Icon name="Grid" size={18} /></div>
                                <h1 className="text-base font-bold tracking-tight">Maze Architect Pro</h1>
                            </div>
                            <div className="flex gap-1 bg-slate-50 p-1 rounded-md border">
                                <button onClick={undo} disabled={historyIdx <= 0} className="p-1.5 hover:bg-white rounded disabled:opacity-20 transition-opacity" title="元に戻す"><Icon name="Undo2" size={16}/></button>
                                <button onClick={redo} disabled={historyIdx >= history.length - 1} className="p-1.5 hover:bg-white rounded disabled:opacity-20 transition-opacity" title="やり直し"><Icon name="Redo2" size={16}/></button>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => { const s = new MazeSolver(grid, hWalls, vWalls, pairs, warps, solverOptions); const r = s.solve(); setSolutions(r); setStatusMsg(Object.keys(r).length > 0 ? '求解が完了しました' : '経路が見つかりません'); }} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold transition-all shadow-md active:scale-95 text-xs">
                                <Icon name="Play" size={14} fill="white" /> 求解実行
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden relative">
                        {/* Sidebar */}
                        <aside className={`bg-white border-r flex flex-col overflow-y-auto transition-all duration-300 z-40 shadow-sm ${isSidebarOpen ? 'w-80' : 'w-0'}`}>
                            <div className="min-w-[320px] flex flex-col h-full">
                                <div className="p-4 flex-1">
                                    <div className="flex items-center justify-between mb-4">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">求解ペア ({pairs.length})</h2>
                                        <button onClick={() => { const n = [...pairs, { id: Date.now(), start: null, goal: null, requiredCells: [], color: COLORS[pairs.length % COLORS.length], mode: PATH_MODES.SHORTEST, moveRule: MOVE_RULES.FREE }]; setPairs(n); setActivePairIdx(n.length-1); }} className="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 p-1.5 rounded-md transition-colors"><Icon name="Plus" size={16} /></button>
                                    </div>
                                    <div className="space-y-3">
                                        {pairs.map((p, i) => (
                                            <div key={p.id} onClick={() => setActivePairIdx(i)} className={`relative p-3 rounded-xl border-2 transition-all cursor-pointer ${activePairIdx === i ? 'border-indigo-400 bg-indigo-50/10 shadow-sm' : 'border-slate-100 bg-slate-50 hover:bg-slate-100'}`}>
                                                <div className="flex items-center justify-between mb-2.5">
                                                    <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:p.color}}/><span className="font-black text-[10px] uppercase">ペア {i+1}</span></div>
                                                    {pairs.length > 1 && <button onClick={(e) => {e.stopPropagation(); const n=pairs.filter((_, idx)=>idx!==i); setPairs(n); setActivePairIdx(0);}} className="text-slate-300 hover:text-red-500 transition-colors"><Icon name="Trash2" size={12}/></button>}
                                                </div>
                                                <div className="space-y-2">
                                                    <select className="w-full text-[11px] p-2 rounded border bg-white font-bold cursor-pointer outline-none" value={p.moveRule} onChange={(e)=>{const n=[...pairs]; n[i].moveRule=e.target.value; setPairs(n);}}>{Object.values(MOVE_RULES).map(v=><option key={v} value={v}>{v}</option>)}</select>
                                                    <select className="w-full text-[11px] p-2 rounded border bg-white font-bold cursor-pointer outline-none" value={p.mode} onChange={(e)=>{const n=[...pairs]; n[i].mode=e.target.value; setPairs(n);}}>{Object.values(PATH_MODES).map(v=><option key={v} value={v}>{v}</option>)}</select>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 border-t bg-slate-50 space-y-4">
                                    <div className="flex items-center justify-between px-1"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">探索上限</span><input type="number" className="w-16 text-xs font-bold border rounded p-1.5 text-center bg-white" value={solverOptions.maxSolutions} onChange={(e)=>setSolverOptions({...solverOptions, maxSolutions: parseInt(e.target.value) || 1})}/></div>
                                    <div className="pt-2 border-t text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                        <h2 className="mb-3">盤面サイズ変更</h2>
                                        <div className="flex items-center gap-2 mb-3">
                                            <input type="number" className="w-full text-xs border rounded p-2 text-center font-bold" value={targetDim.w} onChange={(e)=>setTargetDim({...targetDim, w: parseInt(e.target.value)||1})}/><span className="text-slate-300 font-bold">×</span><input type="number" className="w-full text-xs border rounded p-2 text-center font-bold" value={targetDim.h} onChange={(e)=>setTargetDim({...targetDim, h: parseInt(e.target.value)||1})}/>
                                        </div>
                                        <button onClick={applyResize} className="w-full py-2.5 bg-slate-800 hover:bg-black text-white rounded-lg transition-all tracking-wider font-bold">適用する</button>
                                    </div>
                                    <div className="flex flex-col gap-2 border-t pt-4 pb-2">
                                        <button onClick={() => { const data = JSON.stringify({ grid, hWalls, vWalls, pairs, warps, dim }); const blob = new Blob([data], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'maze.json'; a.click(); }} className="w-full py-2 bg-white border border-indigo-200 text-indigo-700 rounded-lg text-[11px] font-black uppercase hover:bg-indigo-50 transition-all flex items-center justify-center gap-2 shadow-sm"><Icon name="Save" size={14}/> ファイル保存</button>
                                        <label className="w-full py-2 bg-white border border-indigo-200 text-indigo-700 rounded-lg text-[11px] font-black uppercase hover:bg-indigo-50 transition-all flex items-center justify-center gap-2 cursor-pointer shadow-sm"><Icon name="FileUp" size={14}/> ファイル読込<input type="file" className="hidden" accept=".json" onChange={(e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => { try { const d = JSON.parse(ev.target.result); setGrid(d.grid); setHWalls(d.hWalls); setVWalls(d.vWalls); setPairs(d.pairs); setWarps(d.warps); setDim(d.dim); setTargetDim(d.dim); saveHistory(d); } catch(err) { setStatusMsg("読込エラー"); } }; r.readAsText(f); }} /></label>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* Workspace Area */}
                        <main 
                            ref={workspaceRef} 
                            className="flex-1 relative overflow-hidden bg-slate-200 cursor-crosshair"
                            onWheel={handleWheel}
                            onMouseDown={handleMouseDown}
                            onMouseMove={handleMouseMove}
                            onMouseUp={handleMouseUp}
                        >
                            <div className="absolute transition-transform duration-75 ease-out" style={{ transform: `translate(${viewTransform.x}px, ${viewTransform.y}px) scale(${viewTransform.scale})`, top: '10%', left: '10%' }}>
                                <div ref={gridRef} className="relative shadow-2xl bg-white p-6 border border-slate-300 rounded-sm">
                                    <div className="relative inline-block border-2 border-slate-900">
                                        {/* Grid Cells */}
                                        {grid.map((row, r) => (
                                            <div key={r} className="flex">
                                                {row.map((cell, c) => (
                                                    <div 
                                                        key={c} 
                                                        className={`w-8 h-8 border border-slate-100 relative flex items-center justify-center transition-colors ${cell.isWall ? 'bg-slate-800' : 'bg-white hover:bg-slate-50'}`}
                                                        onMouseDown={(e) => { if(e.button === 0) { setIsDragging(true); setDragType('cell'); handleCellWall(r, c, true); } }}
                                                        onMouseEnter={() => { if(isDragging && dragType === 'cell') handleCellWall(r, c); }}
                                                        onContextMenu={(e) => onCellContextMenu(e, r, c)}
                                                    >
                                                        {getCellContent(r, c)}
                                                    </div>
                                                ))}
                                            </div>
                                        ))}

                                        {/* Boundary Walls (Horizontal) */}
                                        {hWalls.map((row, r) => row.map((isW, c) => (
                                            <div 
                                                key={`h-${r}-${c}`} 
                                                className={`absolute z-40 transition-colors cursor-pointer ${isW ? 'bg-red-600' : 'hover:bg-red-400/20'}`} 
                                                style={{ 
                                                    top: r * CELL_SIZE, 
                                                    left: c * CELL_SIZE - WALL_THICKNESS / 2, 
                                                    width: CELL_SIZE + WALL_THICKNESS, 
                                                    height: WALL_THICKNESS, 
                                                    transform: 'translateY(-50%)' 
                                                }} 
                                                onMouseDown={(e) => { if(e.button===0) { e.stopPropagation(); setIsDragging(true); setDragType('border'); handleBorderWall('h', r, c, true); } }}
                                                onMouseEnter={() => { if(isDragging && dragType === 'border') handleBorderWall('h', r, c); }}
                                            />
                                        )))}
                                        {/* Boundary Walls (Vertical) */}
                                        {vWalls.map((row, r) => row.map((isW, c) => (
                                            <div 
                                                key={`v-${r}-${c}`} 
                                                className={`absolute z-40 transition-colors cursor-pointer ${isW ? 'bg-red-600' : 'hover:bg-red-400/20'}`} 
                                                style={{ 
                                                    left: c * CELL_SIZE, 
                                                    top: r * CELL_SIZE - WALL_THICKNESS / 2, 
                                                    height: CELL_SIZE + WALL_THICKNESS, 
                                                    width: WALL_THICKNESS, 
                                                    transform: 'translateX(-50%)' 
                                                }} 
                                                onMouseDown={(e) => { if(e.button===0) { e.stopPropagation(); setIsDragging(true); setDragType('border'); handleBorderWall('v', r, c, true); } }}
                                                onMouseEnter={() => { if(isDragging && dragType === 'border') handleBorderWall('v', r, c); }}
                                            />
                                        )))}

                                        {/* Warp Connections */}
                                        <svg className="absolute inset-0 pointer-events-none w-full h-full overflow-visible z-10 opacity-40">
                                            {warps.map(w => <line key={w.id} x1={w.a.c*CELL_SIZE+CELL_SIZE/2} y1={w.a.r*CELL_SIZE+CELL_SIZE/2} x2={w.b.c*CELL_SIZE+CELL_SIZE/2} y2={w.b.r*CELL_SIZE+CELL_SIZE/2} stroke="cyan" strokeWidth="2" strokeDasharray="4 2" />)}
                                        </svg>
                                        
                                        {/* Path Visuals */}
                                        {Object.keys(solutions).map(pid => renderPath(Number(pid)))}
                                    </div>
                                </div>
                            </div>

                            {/* Custom Right-Click Menu */}
                            {contextMenu && (
                                <div className="context-menu" style={{ left: contextMenu.x, top: contextMenu.y }}>
                                    <div className="context-menu-item" onClick={() => setAttribute('start', contextMenu.r, contextMenu.c)}>
                                        <div className="w-3 h-3 rounded-full bg-green-500 shadow-sm" /> スタート地点
                                    </div>
                                    <div className="context-menu-item" onClick={() => setAttribute('goal', contextMenu.r, contextMenu.c)}>
                                        <div className="w-3 h-3 rounded-full bg-red-500 shadow-sm" /> ゴール地点
                                    </div>
                                    <div className="context-menu-item" onClick={() => setAttribute('cp', contextMenu.r, contextMenu.c)}>
                                        <div className="w-3 h-3 rotate-45 bg-yellow-400 shadow-sm" /> 必須マス (チェックポイント)
                                    </div>
                                    <div className="context-menu-item" onClick={() => setAttribute('warp', contextMenu.r, contextMenu.c)}>
                                        <div className="w-3 h-3 rounded bg-cyan-500 shadow-sm" /> ワープマス (2点設定)
                                    </div>
                                    <div className="context-menu-divider"></div>
                                    <div className="context-menu-item text-red-500" onClick={() => removeAllAttributes(contextMenu.r, contextMenu.c)}>
                                        <Icon name="Trash2" size={14} className="text-red-500"/> 設定を解除する
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* Band Info Bar */}
                        <footer className="absolute bottom-0 left-0 right-0 bg-indigo-900 text-white px-4 py-2 flex items-center justify-between z-50 shadow-lg text-[10px] font-black uppercase tracking-widest">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse" />
                                    STATUS: READY
                                </div>
                                <div className="flex items-center gap-3 border-l border-indigo-700 pl-4 opacity-80">
                                    <Icon name="MousePointer2" size={12}/>
                                    <span>左ドラッグ: 壁描画 | 中ドラッグ: 移動 | ホイール: ズーム | 右クリック: 属性設定</span>
                                </div>
                                {statusMsg && (
                                    <div className="flex items-center gap-2 border-l border-indigo-700 pl-4 text-yellow-300">
                                        <Icon name="Info" size={12}/>
                                        {statusMsg}
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-4 opacity-70 tracking-tighter">
                                <span>SIZE: {dim.w}x{dim.h}</span>
                                <span>ZOOM: {Math.round(viewTransform.scale * 100)}%</span>
                                <span>v2.4 Stable</span>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
